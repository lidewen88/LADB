name: 生成签名并输出base64
on: workflow_dispatch  # 仅手动触发，不会自动运行

jobs:
  generate:
    runs-on: ubuntu-latest  # 使用Ubuntu系统运行
    steps:
      - name: 配置JDK17（生成签名需要keytool）
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: 生成安卓签名文件（无交互一键生成）
        run: |
          keytool -genkey -v \
            -keystore my-key.jks \          # 签名文件名
            -alias my-alias \               # 密钥别名
            -keyalg RSA \                   # 安卓必须的加密算法
            -keysize 2048 \                 # 安全密钥长度
            -validity 36500 \               # 有效期100年
            -storepass 12345678 \           # 密钥库密码（记好！）
            -keypass 12345678 \             # 密钥密码（和上面一致）
            -dname "CN=Unknown"             # 跳过个人信息填写

      - name: 转换签名文件为base64（便于保存到Secrets）
        run: base64 my-key.jks > key.txt
          
      - name: 输出base64字符串（复制这段内容！）
        run: |
          echo "===== 开始复制base64 ====="
          cat key.txt
          echo "===== 结束复制base64 ====="
          
      - name: 上传签名文件（备用下载）
        uses: actions/upload-artifact@v5
        with:
          name: my-key.jks
          path: my-key.jks
          retention-days: 7  # 保存7天自动删除
