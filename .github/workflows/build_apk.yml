name: Build LADB Signed Release APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取源码
        uses: actions/checkout@v5

      - name: 配置JDK17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 安装Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
          packages: >
            platform-tools
            build-tools;35.0.0
            platforms;android-35

      # 从仓库密钥恢复你的签名文件 my-key.jks
      - name: 还原签名密钥
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > my-key.jks
          echo "storeFile=../my-key.jks" > app/signing.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> app/signing.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> app/signing.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> app/signing.properties

      - name: 授予编译脚本权限
        run: chmod +x gradlew

      # 编译带签名Release安装包
      - name: 编译Release签名APK
        run: ./gradlew assembleRelease

      # 上传成品APK
      - name: 导出编译好的APK
        uses: actions/upload-artifact@v5
        with:
          name: LADB-签名Release包
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
