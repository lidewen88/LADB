name: Build LADB Release + 流水线自动补签名
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取源码
        uses: actions/checkout@v5

      - name: 配置JDK17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 安装Android SDK 35
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
          packages: >
            platform-tools
            build-tools;35.0.0
            platforms;android-35

      # 1. 还原你的密钥文件 my-key.jks
      - name: 还原签名密钥
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > my-key.jks

      # 2. 编译无签名Release包（不改动gradle，原生输出unsigned）
      - name: 编译未签名Release APK
        run: chmod +x gradlew && ./gradlew assembleRelease

      # 3. 使用apksigner给未签名包补签名（关键，无需改项目源码）
      - name: 给APK正式签名
        run: |
          # 定义工具路径
          APKSIGNER=$ANDROID_HOME/build-tools/35.0.0/apksigner
          UNSIGNED_APK=app/build/outputs/apk/release/app-release-unsigned.apk
          SIGNED_APK=app/build/outputs/apk/release/app-release-signed.apk

          # 执行签名
          $APKSIGNER sign \
            --ks my-key.jks \
            --ks-pass pass:${{ secrets.STORE_PASSWORD }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --out $SIGNED_APK \
            $UNSIGNED_APK

      # 查看生成文件
      - name: 列出APK
        run: ls -la app/build/outputs/apk/release/

      # 只上传签名好的安装包
      - name: 上传已签名APK
        uses: actions/upload-artifact@v5
        with:
          name: LADB-已签名可安装包
          path: app/build/outputs/apk/release/app-release-signed.apk
          retention-days: 30
