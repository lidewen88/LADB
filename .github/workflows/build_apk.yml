name: Build LADB + 禁用签名验证 + 自动签名
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取源码
        uses: actions/checkout@v5

      - name: 配置JDK17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 安装Android SDK 35
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
          packages: >
            platform-tools
            build-tools;35.0.0
            platforms;android-35

      # 1. 还原签名密钥
      - name: 还原签名密钥
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > my-key.jks

      # 2. 编译+禁用签名验证（关键：添加-DDISABLE_LICENSE_CHECK=true参数）
      - name: 编译并禁用验证
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease -PDISABLE_LICENSE_CHECK=true

      # 3. 使用apksigner补签名（不改动源码的签名方案）
      - name: 给APK正式签名
        run: |
          APKSIGNER=$ANDROID_HOME/build-tools/35.0.0/apksigner
          UNSIGNED_APK=app/build/outputs/apk/release/app-release-unsigned.apk
          SIGNED_APK=app/build/outputs/apk/release/app-release-signed.apk

          $APKSIGNER sign \
            --ks my-key.jks \
            --ks-pass pass:${{ secrets.STORE_PASSWORD }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --out $SIGNED_APK \
            $UNSIGNED_APK

      # 4. 验证签名结果
      - name: 验证APK签名
        run: |
          $ANDROID_HOME/build-tools/35.0.0/apksigner verify -v app/build/outputs/apk/release/app-release-signed.apk
          ls -la app/build/outputs/apk/release/

      # 5. 上传最终可安装包
      - name: 上传已签名APK
        uses: actions/upload-artifact@v5
        with:
          name: LADB-已签名可安装包
          path: app/build/outputs/apk/release/app-release-signed.apk
          retention-days: 30
