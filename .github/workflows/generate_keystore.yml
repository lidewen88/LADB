name: 生成签名并输出base64
on: workflow_dispatch

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: 配置JDK17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: 生成安卓签名文件
        run: |
          keytool -genkey -v \
            -keystore my-key.jks \
            -alias my-alias \
            -keyalg RSA \
            -keysize 2048 \
            -validity 36500 \
            -storepass 12345678 \
            -keypass 12345678 \
            -dname "CN=User,OU=Dev,O=Dev,L=City,ST=Province,C=CN"
          
      - name: 转base64
        run: base64 my-key.jks > key.txt
          
      - name: 打印base64
        run: |
          echo "=====复制下面全部字符串====="
          cat key.txt
          echo "=====复制结束====="
          
      - name: 下载密钥文件备用
        uses: actions/upload-artifact@v5
        with:
          name: my-key-jks备份
          path: my-key.jks
          retention-days: 7
